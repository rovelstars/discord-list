# netlify.toml
#
# Netlify build & function configuration for the discord-list SvelteKit site.
#
# Scheduled functions:
#   scheduled-cdn-refresh - runs every 12 hours to refresh stale Discord CDN
#   attachment URLs stored in the Bots.bg column of the database.
#   settle-rewards        - runs daily at 02:00 UTC to pay out referral rewards.
#   scheduled-reindex     - runs daily at 04:00 UTC; submits a rolling batch of
#   canonical URLs to IndexNow to keep search engines re-crawling the site.
#
# Required environment variables (set in Netlify UI → Site → Environment vars):
#   INTERNAL_SECRET   - shared secret used to authenticate calls from the
#                       scheduled function to /api/internals/refresh-cdn-bgs
#   SITE_URL          - your deployed origin, e.g. https://yoursite.netlify.app
#   DISCORD_TOKEN     - Discord Bot token used to call the refresh-urls API
#   DATABASE_URL      - libSQL / Turso database URL
#   TURSO_TOKEN       - (optional) Turso auth token if your DB requires one

# ---------------------------------------------------------------------------
# Build settings
# ---------------------------------------------------------------------------

[build]
  # Directory containing the built output after `npm run build` / `bun run build`.
  # SvelteKit's adapter-auto produces a Netlify-compatible build here.
  publish = "build"

  # The command Netlify runs to build the site.
  command = "bun run build"

  # Directory where Netlify looks for function source files.
  functions = "netlify/functions"

# ---------------------------------------------------------------------------
# SvelteKit / adapter-netlify compatibility
# ---------------------------------------------------------------------------

# adapter-netlify (invoked by adapter-auto on Netlify) injects its own
# catch-all redirect and SSR function automatically during the build step.
# Do NOT add a manual [[redirects]] catch-all here - it will conflict with
# the adapter and break SSR routes.

# ---------------------------------------------------------------------------
# Scheduled function: CDN background-URL refresh
# ---------------------------------------------------------------------------
# NOTE: Netlify reads the schedule from the function's exported `config` object
# (see netlify/functions/scheduled-cdn-refresh.mts).  The [functions] block
# below sets global function options; per-function overrides use the
# [functions."<name>"] sub-table syntax.

[functions]
  directory = "netlify/functions"

# How long Netlify allows the scheduled function to run before timing it out.
# 15 minutes is the maximum on the free tier.
[functions."scheduled-cdn-refresh"]
  timeout = 900

# How long Netlify allows the settle-rewards scheduled function to run.
# The daily reward settlement pass iterates over all active referrals and
# may perform many sequential DB writes; 15 minutes (900s) is the free-tier
# maximum and comfortably covers even large referral volumes.
[functions."settle-rewards"]
  timeout = 900

# Scheduled IndexNow re-submission. Daily run; endpoint picks a rolling
# slice of the canonical URL catalog and POSTs it to the IndexNow API.
# Usually finishes in well under a minute — the 300s ceiling is a safety
# margin against IndexNow endpoint slowness on large catalogs.
[functions."scheduled-reindex"]
  timeout = 300
